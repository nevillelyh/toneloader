name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build, test, and validate
        run: make test validate

      - name: Package LV2 bundle
        id: package
        shell: bash
        run: |
          tag=${GITHUB_REF_NAME//\//-}
          archive="toneloader-${tag}-linux-x86_64.tar.gz"
          tar -C build/lv2 -czf "${archive}" ToneLoader.lv2
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          "${{ steps.package.outputs.archive }}#ToneLoader LV2 bundle (Linux x86-64)"
          --verify-tag
          --generate-notes
