name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            architecture: x86_64
          - runner: ubuntu-24.04-arm
            architecture: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build, test, and validate
        run: make test validate

      - name: Package LV2 bundle
        id: package
        shell: bash
        run: |
          tag=${GITHUB_REF_NAME//\//-}
          archive="toneloader-${tag}-linux-${{ matrix.architecture }}.tar.gz"
          tar -C build/lv2 -czf "${archive}" ToneLoader.lv2
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload LV2 bundle
        uses: actions/upload-artifact@v4
        with:
          name: toneloader-linux-${{ matrix.architecture }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download LV2 bundles
        uses: actions/download-artifact@v4
        with:
          pattern: toneloader-linux-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag=${GITHUB_REF_NAME//\//-}
          gh release create "${GITHUB_REF_NAME}" \
            "dist/toneloader-${tag}-linux-x86_64.tar.gz#ToneLoader LV2 bundle (Linux x86-64)" \
            "dist/toneloader-${tag}-linux-arm64.tar.gz#ToneLoader LV2 bundle (Linux arm64)" \
            --verify-tag \
            --generate-notes
